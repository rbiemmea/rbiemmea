  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

dex: 60;\n    background: #f6f2ea;\n    transform: translateY(100%);\n    transition: transform 0.95s cubic-bezier(0.65, 0, 0.25, 1);\n    pointer-events: none;\n    box-shadow: 0 -30px 80px -10px rgba(0, 0, 0, 0.55);\n  }\n  body.show-landing .landing-frame {\n    transform: translateY(0);\n    pointer-events: auto;\n  }\n\n  /* ─── DISCOVER BUTTON ─── */\n  .ui-discover {\n    position: fixed;\n    bottom: 26px;\n    left: 50%;\n    transform: translateX(-50%);\n    z-index: 25;\n    background: none;\n    border: none;\n    cursor: pointer;\n    padding: 10px 16px;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 9px;\n    opacity: 0;\n    animation: fadeIn 1.4s var(--ease) forwards 4.2s;\n    transition: transform 0.6s var(--ease);\n  }\n  .ui-discover:hover { transform: translateX(-50%) translateY(-4px); }\n  .ui-discover:hover .discover-label  { color: #fff5d0; letter-spacing: 0.38em; }\n  .ui-discover:hover .discover-line   { background: linear-gradient(to bottom, transparent 5%, #fff5d0 95%); }\n  .ui-discover:hover .discover-chevron { stroke: #fff5d0; }\n\n  .discover-label {\n    font-family: var(--font-sans);\n    font-size: 0.66rem;\n    font-weight: 600;\n    letter-spacing: 0.34em;\n    text-transform: uppercase;\n    color: #ffd75e;\n    transition: color 0.4s ease, letter-spacing 0.4s var(--ease);\n    text-shadow:\n      0 0 8px rgba(255, 200, 80, 0.55),\n      0 1px 10px rgba(0, 0, 0, 0.7);\n  }\n  .discover-line {\n    width: 1px;\n    height: 28px;\n    background: linear-gradient(to bottom, transparent 5%, #ffd75e 95%);\n    transform-origin: top center;\n    animation: discoverLine 2.6s var(--ease) infinite;\n    box-shadow: 0 0 6px rgba(255, 200, 80, 0.6);\n  }\n  .discover-chevron {\n    display: block;\n    stroke: #ffd75e;\n    stroke-width: 2;\n    transition: stroke 0.4s ease;\n    animation: discoverChev 2.6s var(--ease) infinite;\n    filter:\n      drop-shadow(0 0 4px rgba(255, 200, 80, 0.7))\n n    transition: background 0.3s ease, border-color 0.3s ease, transform 0.3s var(--ease);\n    opacity: 0;\n    animation: fadeIn 1s var(--ease) forwards 1.2s;\n  }\n  .ui-reset:hover {\n    background: rgba(74, 124, 32, 0.25);\n    border-color: rgba(232,184,75,0.4);\n    transform: translateY(-2px);\n  }\n  .ui-reset svg { display: block; }\n\n  /* ─── CONTROLS BOX (new compatto) ─── */\n  .ui-controls {\n    position: fixed;\n    bottom: 80px;\n    left: 50%;\n    transform: translateX(-50%);\n    z-index: 20;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 0;\n    opacity: 0;\n    animation: fadeIn 1.2s var(--ease) forwards 3.2s;\n  }\n\n  .ui-controls-box {\n    display: flex;\n    align-items: center;\n    flex-wrap: wrap;\n    justify-content: center;\n    max-width: 92vw;\n    box-sizing: border-box;\n    gap: 20px;\n    padding: 14px 28px;\n    background: rgba(10, 18, 6, 0.25);\n    backdrop-filter: blur(16px) saturate(1.5);\n    -webkit-backdrop-filter: blur(16px) saturate(1.5);\n    border: 1px solid rgba(232,184,75,0.1);\n    border-radius: 100px;\n    transition: all 0.45s var(--ease);\n    overflow: hidden;\n  }\n\n  .ui-controls:hover .ui-controls-box {\n    background: rgba(10, 18, 6, 0.85);\n    border-color: rgba(232,184,75,0.28);\n    max-height: 200px;\n    padding: 16px 30px;\n  }\n\n  .control-item {\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    font-family: var(--font-sans);\n    font-size: 0.72rem;\n    font-weight: 500;\n    letter-spacing: 0.05em;\n    color: rgba(246,242,234,0.75);\n    white-space: nowrap;\n    transition: color 0.3s ease;\n  }\n\n  .ui-controls:hover .control-item {\n    color: var(--cream);\n  }\n\n  .control-icon {\n    font-size: 0.9rem;\n    display: inline-block;\n  }\n\n  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }\n\n  /* ─── TOOLTIP ─── */\n  .tooltip {\n    position: fixed;\n    top: 0; left: 0;\n    z-index: 30;\n    padding: 7px 14px;  \"Strada Ghiroda, Romania\"\n      },\n      \"ro\": {\n        \"groupLabel\": \"Compania\",\n        \"eyebrow\": \"Aluniș · România · Din 2019\",\n        \"title\": \"R.BIEMMEA\",\n        \"subtitle\": \"Società Agricola S.r.l.\",\n        \"body\": [\n          \"Producție de alune de excelență.\",\n          \"Un aluniș întins pe <strong>70–80 de hectare</strong> în inima României, cu peste <strong>30.000 de plante</strong> cultivate cu pasiune, tehnică și respect profund pentru teritoriu.\"\n        ],\n        \"footer\": \"Strada Ghiroda, România\"\n      }\n    }\n  },\n  {\n    \"id\": \"chi-siamo\",\n    \"group\": \"identity\",\n    \"attach\": {\n      \"branch\": \"trunk\",\n      \"t\": 0.45\n    },\n    \"i18n\": {\n      \"it\": {\n        \"groupLabel\": \"Chi siamo\",\n        \"eyebrow\": \"Chi siamo\",\n        \"title\": \"Radici profonde nella terra romena\",\n        \"body\": [\n          \"R.BIEMMEA S.r.l. è un'azienda agricola specializzata nella coltivazione del nocciolo, con sede lungo la Strada Ghiroda, in Romania. Nata dalla visione di valorizzare le risorse naturali di un territorio straordinariamente fertile, l'azienda unisce competenza agronomica, cura artigianale e spirito imprenditoriale.\",\n          \"I nostri corileti si estendono su oltre 70 ettari, con 30.000 piante selezionate tra varietà da impollinazione e da produzione. La varietà <strong>Giffoni</strong> — la più pregiata d'Italia — è il cuore della nostra produzione.\"\n        ],\n        \"footer\": \"Strada Ghiroda, Romania\"\n      },\n      \"ro\": {\n        \"groupLabel\": \"Despre noi\",\n        \"eyebrow\": \"Despre noi\",\n        \"title\": \"Rădăcini adânci în pământul românesc\",\n        \"body\": [\n          \"R.BIEMMEA S.r.l. este o companie agricolă specializată în cultivarea alunului, cu sediul de-a lungul Străzii Ghiroda, în România. Născută din viziunea de a valorifica resursele naturale ale unui teritoriu extraordinar de fertil, compania îmbin prite.getWorldPosition(wp);\n    // angle around tree\n    const t = Math.atan2(wp.x, wp.z);\n    const dy = wp.y - orbit.target.y;\n    // approach distance based on hotspot height (closer for top/bottom alike)\n    const dist = 3.4;\n    // phi: keep gentle tilt\n    const phi = Math.PI / 2 - 0.15 + (wp.y > 3 ? -0.15 : 0.05);\n    orbit.flyTo(wp, dist, t, phi);\n  }\n\n  function handleTap(clientX, clientY) {\n    if (orbit.wasDrag()) return;\n    setMouseNDC(clientX, clientY);\n    const hits = intersectHotspots();\n    if (hits.length) {\n      const sprite = hits[0].object;\n      openCard(sprite.userData.node);\n      focusOnHotspot(sprite);\n    }\n  }\n  canvas.addEventListener('mouseup', (e) => handleTap(e.clientX, e.clientY));\n  canvas.addEventListener('touchend', (e) => {\n    if (!e.changedTouches.length) return;\n    handleTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);\n  });\n\n  // hover\n  const tooltip = document.getElementById('tooltip');\n  const tooltipGroup = document.getElementById('tooltipGroup');\n  const tooltipLabel = document.getElementById('tooltipLabel');\n  let mouseClientX = 0, mouseClientY = 0;\n  canvas.addEventListener('mousemove', (e) => {\n    mouseClientX = e.clientX;\n    mouseClientY = e.clientY;\n    if (orbit.dragging) {\n      if (hoveredHotspot) { hoveredHotspot = null; tooltip.classList.remove('visible'); canvas.classList.remove('pointing'); }\n      return;\n    }\n    setMouseNDC(e.clientX, e.clientY);\n    const hits = intersectHotspots();\n    if (hits.length) {\n      const sprite = hits[0].object;\n      if (hoveredHotspot !== sprite) {\n        hoveredHotspot = sprite;\n        const n = sprite.userData.node;\n        const t = L(n);\n        tooltipGroup.textContent = t.groupLabel || '';\n        tooltipLabel.textContent = t.title || '';\n        tooltip.classList.add('visible');\n      }\n      tooltip.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, calc(-100% - 14px))`;\n      canvas.classList.add('pointing');\n    } else {\n      if (hoveredHotspot) {\n        hoveredHotspot = null;\n        tooltip.classList.remove('visible');\n        canvas.classList.remove('pointing');\n      }\n    }\n  });\n\n  /* ============================================================\n     CARD MODAL\n     ============================================================ */\n  const cardModal = document.getElementById('cardModal');\n  const cardBackdrop = document.getElementById('cardBackdrop');\n  const cardClose = document.getElementById('cardClose');\n  const cardEyebrow = document.getElementById('cardEyebrow');\n  const cardTitle = document.getElementById('cardTitle');\n  const cardSubtitle = document.getElementById('cardSubtitle');\n  const cardBody = document.getElementById('cardBody');\n  const cardFooter = document.getElementById('cardFooter');\n  const cardFooterText = document.getElementById('cardFooterText');\n\n  let currentOpenNode = null;\n\n  function openCard(node) {\n    currentOpenNode = node;\n    const t = L(node);\n    cardEyebrow.textContent = t.eyebrow || '';\n    cardTitle.textContent = t.title || '';\n    if (t.subtitle) {\n      cardSubtitle.textContent = t.subtitle;\n      cardSubtitle.style.display = '';\n    } else {\n      cardSubtitle.style.display = 'none';\n    }\n    // body\n    let html = '';\n    const bodyArr = Array.isArray(t.body) ? t.body : [t.body || ''];\n    bodyArr.forEach(p => { html += `<p>${p}</p>`; });\n    if (t.list && t.list.length) {\n      html += '<ul class=\"card-list\">';\n      t.list.forEach(it => { html += `<li>${it}</li>`; });\n      html += '</ul>';\n    }\n    cardBody.innerHTML = html;\n    // footer\n    if (t.footer) {\n      cardFooterText.textContent = t.footer;\n      cardFooter.style.display = '';\n    } else {\n      cardFooter.style.display = 'none';\n    }\n    cardModal.classList.add('open');\n    // scroll card to top\n    requestAnimationFrame(() => {\n      const panel = cardModal.querySelector('.card-panel');\n      if (panel) panel.scrollTop = 0;\n    });\n  }\n  function closeCard() {\n    currentOpenNode = null;\n    cardModal.classList.remove('open');\n  }\n  // expose so global language switch can re-render the open card\n  window.__refreshOpenCard = function () {\n    if (currentOpenNode && cardModal.classList.contains('open')) {\n      openCard(currentOpenNode);\n    }\n  };\n  cardClose.addEventListener('click', closeCard);\n  cardBackdrop.addEventListener('click', closeCard);\n  document.addEventListener('keydown', (e) => {\n    if (e.key === 'Escape' && cardModal.classList.contains('open')) closeCard();\n  });\n\n  /* ============================================================\n     RESET VIEW\n     ============================================================ */\n  function resetView() {\n    closeCard();\n    orbit.flyTo(new THREE.Vector3(0, 1.5, 0), 15, orbit.theta, Math.PI / 2.4);\n  }\n  document.getElementById('resetBtn').addEventListener('click', resetView);\n  document.getElementById('logoBtn').addEventListener('click', resetView);\n  document.getElementById('resetBtnInBox').addEventListener('click', resetView);\n\n  /* ============================================================\n     INTRO\n     ============================================================ */\n  const introEl = document.getElementById('intro');\n  setTimeout(() => { introEl.classList.add('gone'); }, 2400);\n  // pointer-events stays none on intro; user can interact even during fade\n\n  /* ============================================================\n     RESIZE\n     ============================================================ */\n  function resize() {\n    const w = window.innerWidth;\n    const h = window.innerHeight;\n    renderer.setSize(w, h, false);\n    camera.aspect = w / h;\n    camera.updateProjectionMatrix();\n  }\n  window.addEventListener('resize', resize);\n  resize();\n\n  /* ============================================================\n     ANIMATION LOOP\n     ============================================================ */\n  const GROWTH_DURATION = 2.9;\n  let last = 0;\n\n  function animate() {\n    requestAnimationFrame(animate);\n    if (window.treePaused) { last = clock.getElapsedTime(); return; }\n    const elapsed = clock.getElapsedTime();\n    const dt = Math.min(0.05, elapsed - last);\n    last = elapsed;\n\n    const growthP = prefersReduced ? 1 : Math.min(1, elapsed / GROWTH_DURATION);\n    const wind = prefersReduced ? 0.45 : smoothstep(1.0, 3.6, elapsed);\n\n    // branches: growth + sway\n    for (let i = 0; i < branches.length; i++) {\n      const b = branches[i];\n      if (!b.grown) {\n        const local = easeOutCubic(Math.min(1, Math.max(0, (growthP - b.delay) / b.span)));\n        b.scaler.scale.y = Math.max(0.0001, local * b.length);\n        b.pivot.visible = local > 0.001;\n        if (local >= 0.999) {\n          b.container.visible = true;\n          b.grown = true;\n          b.scaler.scale.y = b.length;\n        }\n      }\n      if (b.pivot.visible) {\n        const dFactor = b.depth === 0 ? 0.12 : 1;\n        const s = Math.sin(elapsed * 0.7 + b.phase) * b.swayAmp\n                + Math.sin(elapsed * 1.45 + b.phase2) * b.swayAmp * 0.35;\n        b.pivot.rotation.x = b.baseRotX + s * wind * dFactor;\n        b.pivot.rotation.z = b.baseRotZ + Math.cos(elapsed * 0.55 + b.phase) * b.swayAmp * 0.6 * wind * dFactor;\n      }\n    }\n\n    // leaves / nuts growth\n    if (growthP < 1) {\n      for (let i = 0; i < leaves.length; i++) {\n        const lf = leaves[i];\n        const local = easeOutCubic(Math.min(1, Math.max(0, (growthP - lf.delay) / lf.span)));\n        if (lf.nut) {\n          lf.mesh.scale.set(lf.base * local, lf.baseY * local, lf.base * local);\n        } else {\n          lf.mesh.scale.setScalar(Math.max(0.0001, lf.base * local));\n        }\n      }\n    }\n\n    // hotspots: fade in after growth, pulse, hover scale\n    const hotspotStart = GROWTH_DURATION + 0.2;\n    const hotspotFade = smoothstep(hotspotStart, hotspotStart + 0.9, elapsed);\n    for (let i = 0; i < hotspots.length; i++) {\n      const h = hotspots[i];\n      const u = h.userData;\n      u.fadeIn += (hotspotFade - u.fadeIn) * 0.08;\n      const hov = (h === hoveredHotspot) ? 1 : 0;\n      u.hoverLerp += (hov - u.hoverLerp) * 0.18;\n      const pulse = 1 + Math.sin(elapsed * 2.2 + u.pulsePhase) * 0.14;\n      const s = u.baseScale * (1 + u.hoverLerp * 0.55) * pulse * u.fadeIn;\n      h.scale.set(s, s, s);\n      h.material.opacity = 0.55 + u.hoverLerp * 0.45;\n    }\n\n    // particles\n    if (particles) {\n      const pos = particles.geometry.attributes.position.array;\n      const sp = particles.userData.speed;\n      for (let i = 0; i < sp.length; i++) {\n        pos[i * 3 + 1] += sp[i] * dt;\n        pos[i * 3] += Math.sin(elapsed * 0.4 + i) * 0.0018;\n        if (pos[i * 3 + 1] > 9) pos[i * 3 + 1] = -2.0;\n      }\n      particles.geometry.attributes.position.needsUpdate = true;\n      particles.material.opacity = 0.5 * smoothstep(1.5, 3.2, elapsed);\n    }\n\n    // background trees: wind sway\n    for (let i = 0; i < bgTrees.length; i++) {\n      const t = bgTrees[i];\n      const u = t.userData;\n      const s = Math.sin(elapsed * 0.6 + u.swayPhase) * u.swayAmp\n              + Math.sin(elapsed * 1.4 + u.swayPhase2) * u.swayAmp * 0.4;\n      t.rotation.z = u.baseRotZ + s * wind;\n      t.rotation.x = u.baseRotX + Math.cos(elapsed * 0.55 + u.swayPhase + 0.7) * u.swayAmp * 0.7 * wind;\n    }\n\n    // clouds: slow drift around scene\n    for (let i = 0; i < clouds.length; i++) {\n      const c = clouds[i];\n      const u = c.userData;\n      u.az += u.speed * dt;\n      const cosE = Math.cos(u.elev);\n      c.position.x = u.R * cosE * Math.sin(u.az);\n      c.position.z = u.R * cosE * Math.cos(u.az);\n    }\n\n    // intro camera dolly-in for the first ~2.5s (overrides target only)\n    if (elapsed < 2.5 && !orbit.dragging) {\n      const p = easeOutExpo(elapsed / 2.5);\n      orbit.tDistance = 22 - p * 7; // 22 -> 15\n    }\n\n    orbit.update(dt, elapsed);\n\n    renderer.render(scene, camera);\n  }\n  animate();\n})();\n<\u002Fscript>\n\n<script>\n/* ============================================================\n   I18N RUNTIME — IT / RO language toggle\n   ============================================================ */\n(function () {\n  const SUPPORTED = ['it', 'ro'];\n  const STORAGE_KEY = 'rbiemmea_lang';\n\n  function getInitialLang() {\n    try {\n      const stored = localStorage.getItem(STORAGE_KEY);\n      if (stored && SUPPORTED.indexOf(stored) !== -1) return stored;\n    } catch (e) {}\n    return 'it';\n  }\n\n  function applyLanguage(lang) {\n    if (SUPPORTED.indexOf(lang) === -1) lang = 'it';\n    window.__currentLang = lang;\n\n    // 1. <html lang>\n    document.documentElement.setAttribute('lang', lang);\n\n    // 2. Static UI strings via data-i18n\n    const dict = (typeof TREE_I18N !== 'undefined') ? (TREE_I18N[lang] || TREE_I18N.it) : {};\n    document.querySelectorAll('[data-i18n]').forEach(el => {\n      const key = el.getAttribute('data-i18n');\n      if (dict[key] !== undefined) el.textContent = dict[key];\n    });\n    // data-i18n-aria → aria-label\n    document.querySelectorAll('[data-i18n-aria]').forEach(el => {\n      const key = el.getAttribute('data-i18n-aria');\n      if (dict[key] !== undefined) el.setAttribute('aria-label', dict[key]);\n    });\n    // data-i18n-attr → \"attrName:dictKey\"\n    document.querySelectorAll('[data-i18n-attr]').forEach(el => {\n      const spec = el.getAttribute('data-i18n-attr');\n      if (!spec) return;\n      const [attrName, key] = spec.split(':');\n      if (attrName && key && dict[key] !== undefined) el.setAttribute(attrName.trim(), dict[key]);\n    });\n    // <title>\n    if (dict['title']) document.title = dict['title'];\n\n    // 3. Update toggle button active state\n    document.querySelectorAll('.ui-lang button[data-lang]').forEach(btn => {\n      btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);\n    });\n\n    // 4. Re-render the currently open card (its content is read from NODES)\n    if (typeof window.__refreshOpenCard === 'function') {\n      window.__refreshOpenCard();\n    }\n\n    // 5. Notify the landing iframe so it switches too\n    try {\n      const frame = document.getElementById('landingFrame');\n      if (frame && frame.contentWindow) {\n        frame.contentWindow.postMessage({ type: 'set-lang', lang: lang }, '*');\n      }\n    } catch (e) {}\n  }\n\n  function setLanguage(lang) {\n    if (SUPPORTED.indexOf(lang) === -1) return;\n    try { localStorage.setItem(STORAGE_KEY, lang); } catch (e) {}\n    applyLanguage(lang);\n  }\n\n  // Expose for router & external triggers\n  window.__applyLanguage = applyLanguage;\n  window.__setLanguage = setLanguage;\n\n  // Initial apply\n  const initial = getInitialLang();\n  applyLanguage(initial);\n\n  // Toggle click handlers\n  document.addEventListener('click', (e) => {\n    const btn = e.target.closest && e.target.closest('.ui-lang button[data-lang]');\n    if (!btn) return;\n    e.preventDefault();\n    setLanguage(btn.getAttribute('data-lang'));\n  });\n\n  // Cross-tab/cross-frame sync via storage event\n  window.addEventListener('storage', (e) => {\n    if (e.key === STORAGE_KEY && e.newValue && SUPPORTED.indexOf(e.newValue) !== -1) {\n      applyLanguage(e.newValue);\n    }\n  });\n\n  // Accept lang messages from any frame (e.g. iframe relaying)\n  window.addEventListener('message', (e) => {\n    if (!e || !e.data) return;\n    if (e.data.type === 'lang-change' && SUPPORTED.indexOf(e.data.lang) !== -1) {\n      setLanguage(e.data.lang);\n    }\n  });\n})();\n<\u002Fscript>\n\n<script>\n/* ============================================================\n   ROUTER: tree ↔ landing transition\n   ============================================================ */\n(function () {\n  const frame = document.getElementById('landingFrame');\n  const discoverBtn = document.getElementById('discoverBtn');\n  if (!frame || !discoverBtn) return;\n\n  let loaded = false;\n  function loadFrame() {\n    if (loaded) return;\n    loaded = true;\n    frame.addEventListener('load', () => {\n      // Sync language into the iframe as soon as it's ready\n      try {\n        frame.contentWindow.postMessage({\n          type: 'set-lang',\n          lang: window.__currentLang || 'it'\n        }, '*');\n      } catch (e) {}\n    }, { once: true });\n    frame.src = 'rbiemmea_landing.html';\n  }\n\n  function showLanding(push) {\n    loadFrame();\n    document.body.classList.add('show-landing');\n    window.treePaused = true;\n    const cm = document.getElementById('cardModal');\n    if (cm) cm.classList.remove('open');\n    if (push !== false) {\n      try { history.pushState({ view: 'landing' }, '', '#scopri'); } catch (e) {}\n    }\n    // Avvia animazione foglie nell'iframe dopo che la transizione è completata\n    setTimeout(() => {\n      try { frame.contentWindow.postMessage({ type: 'startTreeAnimation' }, '*'); } catch (e) {}\n    }, 700);\n  }\n\n  function showTree(push) {\n    document.body.classList.remove('show-landing');\n    // unpause after transition completes so the canvas isn't frozen during slide-up reverse\n    setTimeout(() => { window.treePaused = false; }, 60);\n    if (push !== false) {\n      try { history.pushState({ view: 'tree' }, '', ' '); } catch (e) {}\n    }\n  }\n\n  // Trigger\n  discoverBtn.addEventListener('click', () => showLanding(true));\n\n  // Preload on hover / touch for instant slide\n  let preloaded = false;\n  function preload() {\n    if (preloaded) return;\n    preloaded = true;\n    loadFrame();\n  }\n  discoverBtn.addEventListener('mouseenter', preload);\n  discoverBtn.addEventListener('touchstart', preload, { passive: true });\n  // safety fallback preload\n  setTimeout(preload, 7000);\n\n  // ESC inside landing → return to tree\n  window.addEventListener('keydown', (e) => {\n    if (e.key === 'Escape' && document.body.classList.contains('show-landing')) {\n      showTree(true);\n    }\n  });\n\n  // Messages from landing iframe (logo click)\n  window.addEventListener('message', (e) => {\n    if (!e || !e.data) return;\n    if (e.data.action === 'back-to-tree') showTree(true);\n  });\n\n  // Browser back/forward\n  window.addEventListener('popstate', () => {\n    if (location.hash === '#scopri') showLanding(false);\n    else showTree(false);\n  });\n\n  // Deep-link: arrived directly with #scopri\n  if (location.hash === '#scopri') {\n    setTimeout(() => showLanding(false), 350);\n  }\n})();\n<\u002Fscript>\n\n\n</body></html>"</script>
